settings:
  # регионы (можно указать несколько)
  regions:
    - "farmer_zone"
  # время до восстановления пшеницы (в секундах)
  restoreDelay: 20
  # звук при сборе
  sound:
    type: "ENTITY_ITEM_PICKUP"
    volume: 1.0
    pitch: 1.2

# настройка групп, цена умножается на priceMultiplier из категории crops
groups:
  default:
    permission: ""
    price: 1.5
    capacity: 64
  vip:
    permission: "mfarmer.vip"
    price: 2.5
    capacity: 128
  premium:
    permission: "mfarmer.premium"
    price: 4.0
    capacity: 256

# культуры, поддерживаются только те что тут написаны
crops:
  wheat:
    material: WHEAT
    priceMultiplier: 1.0
    displayName: "Пшеница"
  carrots:
    material: CARROTS
    priceMultiplier: 1.2
    displayName: "Морковь"
  potatoes:
    material: POTATOES
    priceMultiplier: 1.1
    displayName: "Картошка"
  beetroots:
    material: BEETROOTS
    priceMultiplier: 0.9
    displayName: "Свёкла"

# настройки для апгрейда рюкзака
upgrade:
  # начальная стоимость первого апгрейда
  baseCost: 1000.0
  # доп.стоимость к последующим
  costPerSlot: 10.0
  # кол-во слотов за один апгрейд
  slotsPerLevel: 10
  # максимум дополнительных слотов (0 = без ограничения)
  maxExtraCapacity: 0
